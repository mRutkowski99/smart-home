<ion-card role="link" class="card">
  <div
    class="card__bg"
    [style]="'background-image: url(' + room?.imgUrl + ');'"
  ></div>
  <div class="card__blur-box">
    <span class="text-2xl font-semibold">{{ room?.name }}</span>
    <span>Devices: {{ room?.devicesCount }}</span>
  </div>
</ion-card>
