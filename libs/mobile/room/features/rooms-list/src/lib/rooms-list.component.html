<ng-container *ngIf="vm$ | async as vm">
  <ng-container *ngIf="layout === 'slides'">
    <!-- Success -->
    <smart-home-slider *ngIf="vm.status === 'success'">
      <ion-slide style="width: auto" *ngFor="let room of vm.rooms">
        <smart-home-room-card [room]="room"></smart-home-room-card>
      </ion-slide>
    </smart-home-slider>

    <!-- Loading -->
    <smart-home-slider *ngIf="vm.status === 'loading'">
      <ion-slide style="width: auto" *ngFor="let skeleton of skeletonCards">
        <smart-home-skeleton [factory]="skeleton"></smart-home-skeleton>
      </ion-slide>
    </smart-home-slider>
  </ng-container>
</ng-container>
